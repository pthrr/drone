# KAS build config — QRB2210 companion computer with PREEMPT_RT
# Uses Arduino's linux-qcom kernel fork for Uno Q board support.
# Build: kas build kas/companion-rt.yml
header:
  version: 14

machine: qcom-armv8a
distro: poky

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    layers:
      meta:
      meta-poky:

  meta-qcom:
    url: https://github.com/Linaro/meta-qcom
    branch: scarthgap

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-virtualization:
    url: https://git.yoctoproject.org/meta-virtualization
    branch: scarthgap

  meta-companion:
    path: meta-companion

local_conf_header:
  base: |
    CONF_VERSION = "2"
    INHERIT += "rm_work"
    INIT_MANAGER = "systemd"
  kernel: |
    PREFERRED_PROVIDER_virtual/kernel = "linux-arduino"
  initramfs: |
    INITRAMFS_IMAGE = "companion-initramfs"
    INITRAMFS_IMAGE_BUNDLE = "1"
  packages: |
    IMAGE_INSTALL:append = " spitools i2c-tools devmem2 coreutils"
  usb-gadget: |
    IMAGE_INSTALL:append = " usb-gadget"
  ssh: |
    EXTRA_IMAGE_FEATURES:append = " ssh-server-openssh"
  serial-console: |
    SERIAL_CONSOLES = "115200;ttyMSM0"
  hostname: |
    hostname:pn-base-files = "drone-companion"

target:
  - core-image-base
